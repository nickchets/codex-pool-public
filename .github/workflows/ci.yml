name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go build -trimpath -o /tmp/codex-pool .
      - run: bash -n scripts/*.sh
      - run: |
          ! grep -RInE 'Claude|Gemini|OpenCode|Anthropic|GitLab|Kimi|MiniMax|Antigravity' \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude=CHANGELOG.md \
            --exclude=README.md \
            --exclude=VERSIONING.md \
            --exclude=security.md \
            .
